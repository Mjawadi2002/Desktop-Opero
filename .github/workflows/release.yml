name: Build & Release Desktop App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist
            platform-label: Windows
          - os: macos-13
            script: dist:mac
            platform-label: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout desktop app
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: Mjawadi2002/Frontend-Opero
          token: ${{ secrets.GH_TOKEN }}
          path: frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build frontend
        working-directory: frontend
        run: npm install && npm run build
        env:
          DISABLE_ESLINT_PLUGIN: 'true'

      - name: Copy frontend build into desktop
        shell: bash
        run: |
          mkdir -p build
          cp -r frontend/build/. build/

      - name: Install desktop dependencies
        run: npm ci

      - name: Build ${{ matrix.platform-label }} app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Teamyy-${{ matrix.platform-label }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: error
          retention-days: 14

  release:
    name: Update GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: Teamyy-Windows
          path: release-assets/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: Teamyy-macOS
          path: release-assets/mac

      - name: Force-update rolling latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa latest -m "Latest build — ${{ github.sha }}"
          git push origin latest --force

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Teamyy Desktop v${{ steps.pkg.outputs.version }} (latest)"
          body: |
            Automated build from `${{ github.ref_name }}` @ [${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            | Platform | File |
            |---|---|
            | Windows | `Teamyy.Setup.${{ steps.pkg.outputs.version }}.exe` (installer) · `.exe` (portable) |
            | macOS | `Teamyy-${{ steps.pkg.outputs.version }}.dmg` |
          artifacts: "release-assets/windows/*.exe,release-assets/mac/*.dmg"
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
